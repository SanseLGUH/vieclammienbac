<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="/resources/toolsfavicon.png">

    <style>
        :root {
            --bg: #1d1d1d;
            --card: #252525;
            --text: #f5f5f5;
            --border: #3a3a3a;
            --hover: #2f2f2f;
            --mono: -apple-system, BlinkMacSystemFont, "Segoe UI",
                    Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body {
        	margin: 0;
        	min-height: 100vh;
        	background: linear-gradient(
        		-160deg,
        		#1a3f8a 0%,  #1a3f8a 10%,
        		#2152b3 10%, #2152b3 20%,
        		#2563eb 20%, #2563eb 30%,
        		#3b82f6 30%, #3b82f6 40%,
        		#60a5fa 40%, #60a5fa 48%,
        		#93c5fd 48%, #93c5fd 52%,
        		#60a5fa 52%, #60a5fa 60%,
        		#3b82f6 60%, #3b82f6 70%,
        		#2563eb 70%, #2563eb 80%,
        		#2152b3 80%, #2152b3 90%,
        		#1a3f8a 90%, #1a3f8a 100%
        	);
        	background-size: 1000% 100%;
        	animation: slideWave 120s linear infinite alternate;
        	overflow-x: hidden;
        }

		@keyframes slideWave {
	      from { background-position: 0% 100%; }
	      to   { background-position: 100% 0%; }
	    }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            text-align: center;
        }

        .title {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
        }

        .menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .menu a {
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 30px 20px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .menu a:hover {
            background: var(--hover);
            transform: translateY(-2px);
            border-color: #555;
        }

        .menu a:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">VIECLAMMIENBAC TOOLS</div>
        <nav class="menu">
            <a href="/tools/drive">Driver</a>
            <a href="/tools/taxpayer">TaxPayer</a>
            <a href="/tools/convert_xsls">Convert XLS</a>
        </nav>
        <div class="footer">
            Internal Tools • Desktop Version
        </div>
    </div>
</body>
</html>
