<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/resources/favicon.png">
  <meta charset="UTF-8">
  <title>XLSX Merge Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }
    .drop-zone {
      border: 2px dashed #444;
      padding: 30px 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 15px;
      border-radius: 8px;
      font-size: 14px;
    }
    .drop-zone.dragover { border-color: #4caf50; }
    .file-item {
      display: flex;
      justify-content: space-between;
      background: #1a1a1a;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      font-size: 13px;
    }
    .file-item button {
      background: none;
      border: none;
      color: #f66;
      cursor: pointer;
      font-size: 16px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #eee;
      font-size: 14px;
    }
    button.action {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
    }
    button.action:active { background: #333; }
    .progress {
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
      display: none;
      margin-top: 15px;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: #4caf50;
    }
    .status {
      text-align: center;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h1>XLSX Merge</h1>

<div id="dropZone" class="drop-zone">
  Tap to select XLSX files
  <input type="file" id="fileInput" multiple accept=".xlsx" hidden>
</div>

<div id="fileList"></div>
<input type="text" id="sheetName" placeholder="Sheet name (Sheet1)">

<button class="action" onclick="uploadTakeSheet()">Take Sheet</button>
<button class="action" onclick="uploadRust('/convert/xlsx/sheets/merge', true)">Merge Sheets</button>
<button class="action" onclick="uploadRust('/convert/xlsx/files/merge', true)">Merge Files</button>
<button class="action" onclick="uploadRust('/convert/xlsx/salaries/sheets/merge', false)">Salary Sheets</button>
<button class="action" onclick="uploadRust('/convert/xlsx/salaries/merge', false)">Salary Merge</button>

<div class="progress" id="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="status" id="status"></div>

<script>
const BASE = "https://tools.vieclammienbac.com";
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");
const progress = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");
const status = document.getElementById("status");

let files = [];

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => addFiles(e.target.files);

dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add("dragover"); };
dropZone.ondragleave = () => dropZone.classList.remove("dragover");
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  addFiles(e.dataTransfer.files);
};

function addFiles(newFiles) {
  for (const f of newFiles)
    if (f.name.toLowerCase().endsWith(".xlsx")) files.push(f);
  renderFiles();
}

function renderFiles() {
  fileList.innerHTML = "";
  files.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerHTML = `${f.name} <button onclick="removeFile(${i})">✕</button>`;
    fileList.appendChild(div);
  });
}

function removeFile(i) {
  files.splice(i, 1);
  renderFiles();
}

function showProgress(pct, text) {
  progress.style.display = "block";
  progressBar.style.width = pct + "%";
  status.textContent = text;
}

function downloadBlob(xhr, fallback = "output.xlsx") {
  const blob = new Blob([xhr.response], {
    type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
  });
  let filename = fallback;
  const cd = xhr.getResponseHeader("Content-Disposition");
  if (cd && cd.includes("filename="))
    filename = cd.split("filename=")[1].replace(/"/g, "").trim();

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function uploadTakeSheet() {
  if (!files.length) return alert("Add at least one file.");
  const sheetName = document.getElementById("sheetName").value || "Sheet1";

  for (let i = 0; i < files.length; i++) {
    showProgress((i / files.length) * 100,
      `Processing ${i + 1}/${files.length}: ${files[i].name}`);

    const formData = new FormData();
    formData.append("document", files[i]);
    formData.append("metadata", new Blob(
      [JSON.stringify({ sheet_name: sheetName })],
      { type: "application/json" }
    ));

    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", `${BASE}/convert/xlsx/take_sheet`);
      xhr.responseType = "arraybuffer";
      xhr.onload = () => xhr.status === 200 ? (downloadBlob(xhr, files[i].name), resolve()) : reject();
      xhr.onerror = reject;
      xhr.send(formData);
    });
  }

  showProgress(100, "Done");
}

function uploadRust(endpoint, withMetadata) {
  if (!files.length) return alert("Add at least one file.");
  const formData = new FormData();
  files.forEach(f => formData.append("documents", f));

  if (withMetadata) {
    const sheetName = document.getElementById("sheetName").value || "Sheet1";
    formData.append("metadata", new Blob(
      [JSON.stringify({ sheet_name: sheetName })],
      { type: "application/json" }
    ));
  }

  const xhr = new XMLHttpRequest();
  xhr.open("POST", `${BASE}${endpoint}`);
  xhr.responseType = "arraybuffer";

  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const pct = (e.loaded / e.total) * 100;
      showProgress(pct, `Uploading ${pct.toFixed(1)}%`);
    }
  };

  xhr.onload = () => {
    if (xhr.status === 200) {
      downloadBlob(xhr);
      showProgress(100, "Done");
    } else {
      showProgress(0, "Error");
    }
  };

  xhr.onerror = () => showProgress(0, "Upload failed");
  xhr.send(formData);
}
</script>

</body>
</html>
