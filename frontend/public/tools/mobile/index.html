<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIECLAMMIENBAC TOOLS</title>

    <style>
        :root {
            --bg: #1d1d1d;
            --card: #262626;
            --text: #f5f5f5;
            --border: #3a3a3a;
            --accent: #ffffff;
            --mono: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
        }

        body {
        	margin: 0;
        	min-height: 100vh;
        	background: linear-gradient(
        		-160deg,
        		#1a3f8a 0%,  #1a3f8a 10%,
        		#2152b3 10%, #2152b3 20%,
        		#2563eb 20%, #2563eb 30%,
        		#3b82f6 30%, #3b82f6 40%,
        		#60a5fa 40%, #60a5fa 48%,
        		#93c5fd 48%, #93c5fd 52%,
        		#60a5fa 52%, #60a5fa 60%,
        		#3b82f6 60%, #3b82f6 70%,
        		#2563eb 70%, #2563eb 80%,
        		#2152b3 80%, #2152b3 90%,
        		#1a3f8a 90%, #1a3f8a 100%
        	);
        	background-size: 1000% 100%;
        	animation: slideWave 120s linear infinite alternate;
        	overflow-x: hidden;
        }

		@keyframes slideWave {
	      from { background-position: 0% 100%; }
	      to   { background-position: 100% 0%; }
	    }

        /* Centered mobile container */
        .container {
            max-width: 420px;
            margin: 0 auto;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        /* Title */
        .title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 32px;
        }

        /* Menu */
        .menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Tool buttons */
        .menu a {
            display: block;
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        /* Touch feedback */
        .menu a:active {
            background: #2f2f2f;
            transform: scale(0.98);
        }

        /* Desktop fallback: keep centered and neat */
        @media (min-width: 768px) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">TOOLS</div>
        <nav class="menu">
            <a href="/tools/drive">Driver</a>
            <a href="/tools/taxpayer">TaxPayer</a>
            <a href="/tools/convert_xsls">Convert XLS</a>
        </nav>
    </div>
</body>
</html>
