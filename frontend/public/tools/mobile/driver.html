<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="/resources/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive Files</title>

    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1a1a1f;
            --border: #2a2a33;
            --text: #f0f0f5;
            --muted: #8a8aa0;
            --accent: #00e5ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 16px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        header span {
            font-size: 12px;
            color: var(--muted);
        }

        .status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--muted);
        }

        button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        button:active {
            opacity: 0.7;
        }

        .upload {
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 18px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--muted);
            position: relative;
        }

        .upload input {
            position: absolute;
            inset: 0;
            opacity: 0;
        }

        .progress {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
        }

        .file {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-info {
            overflow: hidden;
        }

        .file-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 11px;
            color: var(--muted);
        }

        .download {
            text-decoration: none;
            color: var(--accent);
            font-size: 12px;
            border: 1px solid var(--accent);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Drive Files</h1>
        <span>drive.vieclammienbac.com</span>
    </header>

    <div class="status">
        <span id="count">Loading...</span>
        <button onclick="loadFiles()">Refresh</button>
    </div>

    <!-- Upload -->
    <div class="upload">
        Tap to upload files
        <input type="file" multiple onchange="handleFiles(this.files)">
        <div class="progress" id="progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Files -->
    <div id="files"></div>
</div>

<script>
const BASE = 'https://drive.vieclammienbac.com';

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

async function loadFiles() {
    const container = document.getElementById('files');
    const count = document.getElementById('count');
    container.innerHTML = '<div class="empty">Loading...</div>';

    try {
        const res = await fetch(`${BASE}/list`);
        const files = await res.json();

        count.textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;

        if (!files.length) {
            container.innerHTML = '<div class="empty">No files available</div>';
            return;
        }

        container.innerHTML = files.map(f => `
            <div class="file">
                <div class="file-info">
                    <div class="file-name">${f.name}</div>
                    <div class="file-size">${formatSize(f.size)}</div>
                </div>
                <a class="download" href="${BASE}/download?id=${f.id}" download>DL</a>
            </div>
        `).join('');
    } catch (e) {
        count.textContent = 'Error';
        container.innerHTML = '<div class="empty">Failed to load files</div>';
    }
}

function handleFiles(files) {
    [...files].forEach(uploadFile);
}

function uploadFile(file) {
    const progress = document.getElementById('progress');
    const bar = document.getElementById('progress-bar');

    const formData = new FormData();
    formData.append('file', file);

    const xhr = new XMLHttpRequest();
    progress.style.display = 'block';

    xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
            bar.style.width = (e.loaded / e.total) * 100 + '%';
        }
    };

    xhr.onload = () => {
        bar.style.width = '100%';
        setTimeout(() => {
            progress.style.display = 'none';
            bar.style.width = '0%';
            loadFiles();
        }, 500);
    };

    xhr.onerror = () => {
        progress.style.display = 'none';
        bar.style.width = '0%';
        alert('Upload failed');
    };

    xhr.open('POST', `${BASE}/upload`);
    xhr.send(formData);
}

loadFiles();
</script>
</body>
</html>
