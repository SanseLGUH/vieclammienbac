<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/resources/toolsfavicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container { width: 100%; max-width: 900px; }
    h1 { text-align: center; margin-bottom: 30px; }

    .drop-zone {
      border: 2px dashed #444;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 20px;
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .drop-zone.dragover { border-color: #4caf50; }

    .file-item {
      display: flex;
      justify-content: space-between;
      background: #1a1a1a;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
    }
    .file-item button { background: none; border: none; color: #f66; cursor: pointer; }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 15px 0;
      border-radius: 5px;
      border: 1px solid #444;
      background: #1a1a1a;
      color: #eee;
    }

    .categories { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

    .category { border: 1px solid #2a2a2a; border-radius: 8px; overflow: hidden; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #1a1a1a;
      cursor: pointer;
      user-select: none;
    }
    .category-header:hover { background: #222; }

    .category-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-fast     { background: #1b3a1b; color: #4caf50; }
    .badge-fast      { background: #2a2218; color: #e6a020; }

    .category-title { font-weight: bold; font-size: 15px; flex: 1; }
    .category-desc  { font-size: 12px; color: #777; }
    .chevron { font-size: 12px; color: #555; transition: transform 0.2s; }
    .category.open .chevron { transform: rotate(180deg); }

    .category-body {
      display: none;
      padding: 12px 16px;
      background: #161616;
      border-top: 1px solid #2a2a2a;
    }
    .category.open .category-body { display: block; }

    .actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    button.action {
      padding: 12px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #eee;
      cursor: pointer;
      border-radius: 5px;
      font-size: 13px;
      transition: background 0.15s;
    }
    button.action:hover    { background: #2a2a2a; }
    button.action:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress { height: 6px; background: #333; border-radius: 3px; overflow: hidden; display: none; margin-top: 8px; }
    .progress-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.2s; }
    .status { text-align: center; margin-top: 8px; font-size: 13px; word-break: break-all; }
    .status.error { color: #f66; }
    .status.ok    { color: #4caf50; }
  </style>
</head>
<body>
<div class="container">
  <h1>XLSX TOOL TOTALLY NOT VIET ANH OFCOURSE</h1>

  <div id="dropZone" class="drop-zone">
    Drop XLSX files here or click to browse
    <input type="file" id="fileInput" multiple accept=".xlsx" hidden>
  </div>

  <div id="fileList"></div>
  <input type="text" id="sheetName" placeholder="Sheet name (required for Extract, Merge and Split)">

  <div class="categories">

    <!-- ── Fast ── -->
    <div class="category open" id="cat-fast">
      <div class="category-header" onclick="toggleCategory('cat-fast')">
        <span class="category-badge badge-fast">Fast</span>
        <span class="category-title">Any sheet</span>
        <span class="category-desc">Rust · blazing fast · zip manipulation</span>
        <span class="chevron">▼</span>
      </div>
      <div class="category-body">
        <div class="actions">
          <button class="action" onclick="runJob('merge', 'raw')">Merge → one sheet</button>
          <button class="action" onclick="runJob('split', 'raw')">Split → per sheet</button>
          <button class="action" onclick="runExtract()" style="grid-column: span 2;">Extract sheet (one output per file)</button>
        </div>
      </div>
    </div>

  </div>

  <div class="progress" id="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
const BASE = "https://tools.vieclammienbac.com";

const dropZone    = document.getElementById("dropZone");
const fileInput   = document.getElementById("fileInput");
const fileList    = document.getElementById("fileList");
const progress    = document.getElementById("progress");
const progressBar = document.getElementById("progressBar");
const statusEl    = document.getElementById("status");

let files = [];

// ── File handling ─────────────────────────────────────────────────────────────

dropZone.onclick = () => fileInput.click();
fileInput.onchange = e => { addFiles(e.target.files); fileInput.value = ""; };
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add("dragover"); };
dropZone.ondragleave = () => dropZone.classList.remove("dragover");
dropZone.ondrop = e => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  addFiles(e.dataTransfer.files);
};

function addFiles(newFiles) {
  for (const f of newFiles)
    if (f.name.toLowerCase().endsWith(".xlsx")) files.push(f);
  renderFiles();
}

function renderFiles() {
  fileList.innerHTML = "";
  files.forEach((f, i) => {
    const div = document.createElement("div");
    div.className = "file-item";
    div.innerHTML = `<span>${f.name}</span><button onclick="removeFile(${i})">✕</button>`;
    fileList.appendChild(div);
  });
}

function removeFile(i) { files.splice(i, 1); renderFiles(); }

// ── UI helpers ────────────────────────────────────────────────────────────────

function toggleCategory(id) {
  document.getElementById(id).classList.toggle("open");
}

function showProgress(pct, text, type = "") {
  progress.style.display = "block";
  progressBar.style.width = pct + "%";
  statusEl.textContent = text;
  statusEl.className = "status " + type;
}

function setButtons(disabled) {
  document.querySelectorAll("button.action").forEach(b => b.disabled = disabled);
}

function sheetName() {
  return document.getElementById("sheetName").value.trim() || "Sheet1";
}

// ── Upload one file → file_id ─────────────────────────────────────────────────

function uploadFile(file, index, total) {
  return new Promise((resolve, reject) => {
    const form = new FormData();
    form.append("file", file);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", `${BASE}/convert/xlsx/upload`);
    xhr.responseType = "text";

    xhr.upload.onprogress = e => {
      if (e.lengthComputable) {
        const sliceStart = (index / total) * 80;
        const sliceSize  = (1 / total) * 80;
        showProgress(
          sliceStart + (e.loaded / e.total) * sliceSize,
          `Uploading ${index + 1}/${total}: ${file.name}`
        );
      }
    };

    xhr.onload = () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (xhr.status === 200 && data.file_id) resolve(data.file_id);
        else reject(new Error(data.error || `Upload failed (HTTP ${xhr.status})`));
      } catch {
        reject(new Error("Failed to parse upload response"));
      }
    };
    xhr.onerror = () => reject(new Error("Network error during upload"));
    xhr.send(form);
  });
}

// ── Poll until result is ready ────────────────────────────────────────────────

async function pollResult(jobId, intervalMs = 1500, timeoutMs = 300_000) {
  const deadline = Date.now() + timeoutMs;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, intervalMs));
    const res = await fetch(`${BASE}/convert/xlsx/result/${jobId}`);
    if (res.status === 200) return res;
    if (res.status !== 404) throw new Error(`Unexpected status ${res.status} while polling`);
  }
  throw new Error("Timed out waiting for result");
}

function downloadResponse(res, filename = "output.xlsx") {
  return res.blob().then(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  });
}

// ── Merge / Split ─────────────────────────────────────────────────────────────
//
// POST /convert/xlsx/merge  { file_ids, variant, sheet_name? }
// POST /convert/xlsx/split  { file_ids, variant, sheet_name? }
//
// variant: "raw"

async function runJob(action, variant) {
  if (!files.length) return alert("Add at least one file.");
  setButtons(true);
  try {
    const fileIds = [];
    for (let i = 0; i < files.length; i++)
      fileIds.push(await uploadFile(files[i], i, files.length));

    showProgress(82, "Submitting job…");

    const body = { file_ids: fileIds, variant };
    if (variant === "raw") body.sheet_name = sheetName();

    const jobRes = await fetch(`${BASE}/convert/xlsx/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!jobRes.ok) {
      const err = await jobRes.json().catch(() => ({}));
      throw new Error(err.error || `Job failed (HTTP ${jobRes.status})`);
    }
    const { job_id } = await jobRes.json();

    showProgress(90, "Processing on server…");
    await downloadResponse(await pollResult(job_id));
    showProgress(100, "Done", "ok");
  } catch (e) {
    showProgress(0, `Error: ${e.message}`, "error");
  } finally {
    setButtons(false);
  }
}

// ── Extract (one output per input file) ──────────────────────────────────────

async function runExtract() {
  if (!files.length) return alert("Add at least one file.");
  setButtons(true);
  try {
    for (let i = 0; i < files.length; i++) {
      const fileId = await uploadFile(files[i], i, files.length);

      showProgress(((i + 0.5) / files.length) * 80 + 10, `Submitting extract ${i + 1}/${files.length}…`);
      const jobRes = await fetch(`${BASE}/convert/xlsx/extract`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ file_id: fileId, sheet_name: sheetName() }),
      });
      if (!jobRes.ok) {
        const err = await jobRes.json().catch(() => ({}));
        throw new Error(err.error || `Extract failed (HTTP ${jobRes.status})`);
      }
      const { job_id } = await jobRes.json();

      showProgress(((i + 0.8) / files.length) * 80 + 10, `Waiting for result ${i + 1}/${files.length}…`);
      await downloadResponse(await pollResult(job_id), files[i].name);
    }
    showProgress(100, "Done", "ok");
  } catch (e) {
    showProgress(0, `Error: ${e.message}`, "error");
  } finally {
    setButtons(false);
  }
}
</script>
</body>
</html>
